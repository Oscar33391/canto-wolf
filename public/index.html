<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣東話狼人殺 - Phase 2 派牌版</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #ffffff; text-align: center; padding: 20px; }
        .container { max-width: 450px; background: #1e1e1e; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #2c2c2c; color: #fff; font-size: 16px; }
        button { width: 85%; padding: 12px; background: #e50914; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; margin: 10px 0; }
        #startBtn { background: #0077ff; }
        #startBtn:hover { background: #0055cc; }
        #identity-card { background: #ffcc00; color: #000; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 24px; margin: 20px auto; width: 80%; display: none; border: 3px dashed #ff0000; }
        #player-box { width: 85%; background: #2a2a2a; margin: 15px auto; padding: 10px; border-radius: 4px; text-align: left; border-left: 5px solid #e50914; }
        #log-box { width: 85%; height: 120px; background: #000; margin: 15px auto; padding: 10px; border-radius: 4px; text-align: left; overflow-y: auto; font-family: monospace; color: #00ff00; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 5px 0; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🐺 廣東話狼人殺 Phase 2</h2>
        
        <div id="setup-area">
            <input type="text" id="nameInput" placeholder="打你嘅大名 (e.g. 鴨寮街預言家)">
            <input type="text" id="roomInput" placeholder="入房號碼 (e.g. RM999)">
            <button id="joinBtn">進攻間房</button>
        </div>

        <div id="identity-card">
            你的身份是：<br><span id="role-text">🤔 𢱑頭中...</span>
        </div>

        <button id="startBtn" style="display: none;">🔥 齊人開局、隨機派牌</button>

        <h3>👥 間房有邊個：</h3>
        <div id="player-box">
            <ul id="playerList"></ul>
        </div>

        <h3>📜 房內即時動態：</h3>
        <div id="log-box"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5Aoi4sTvkfSr7B5mkpovRgs3hK3EXO44",
            authDomain: "canto-wolf-db.firebaseapp.com",
            databaseURL: "https://canto-wolf-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "canto-wolf-db",
            storageBucket: "canto-wolf-db.firebasestorage.app",
            messagingSenderId: "72589991225",
            appId: "1:72589991225:web:a95b8e9b52675d465a5ce8",
            measurementId: "G-VRSPGVTZFC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myPlayerId = null; // 記錄自己在 Firebase 的專屬 ID
        let currentRoom = null;

        const nameInput = document.getElementById('nameInput');
        const roomInput = document.getElementById('roomInput');
        const joinBtn = document.getElementById('joinBtn');
        const startBtn = document.getElementById('startBtn');
        const playerList = document.getElementById('playerList');
        const logBox = document.getElementById('log-box');
        const identityCard = document.getElementById('identity-card');
        const roleText = document.getElementById('role-text');

        joinBtn.addEventListener('click', () => {
            const username = nameInput.value.trim();
            currentRoom = roomInput.value.trim().toUpperCase();

            if (!username || !currentRoom) {
                alert('填埋個名同房號先啦師兄！');
                return;
            }

            const roomRef = ref(db, `rooms/${currentRoom}`);
            const playersRef = ref(db, `rooms/${currentRoom}/players`);
            const logsRef = ref(db, `rooms/${currentRoom}/logs`);

            // 1. 把自己塞入名單，並抓取隨機生成的 Key 
            const newPlayerRef = push(playersRef);
            myPlayerId = newPlayerRef.key; // 認住自己個 Key
            set(newPlayerRef, { name: username, role: "等待開局..." });

            // 2. 寫入 Log
            const newLogRef = push(logsRef);
            set(newLogRef, { text: `👤 ${username} 塞咗入房喇。` });

            joinBtn.disabled = true;
            joinBtn.innerText = "成功入房";
            startBtn.style.display = "block"; // 顯示開局掣

            // 3. 核心監聽：房內所有人即時更新
            onValue(roomRef, (snapshot) => {
                const roomData = snapshot.val();
                if (!roomData) return;

                // 更新人名名單
                playerList.innerHTML = '';
                if (roomData.players) {
                    Object.entries(roomData.players).forEach(([id, playerObj]) => {
                        if (playerObj && playerObj.name) {
                            const li = document.createElement('li');
                            li.innerText = `👤 ${playerObj.name} [${playerObj.role}]`;
                            playerList.appendChild(li);

                            // 如果後端已經分派左身份，而呢個 ID 咁啱係我，就彈出身份卡！
                            if (id === myPlayerId && playerObj.role !== "等待開局...") {
                                identityCard.style.display = "block";
                                roleText.innerText = playerObj.role;
                            }
                        }
                    });
                }

                // 更新 Log Box
                logBox.innerHTML = '';
                if (roomData.logs) {
                    Object.values(roomData.logs).forEach(logObj => {
                        if (logObj && logObj.text) {
                            const p = document.createElement('p');
                            p.innerText = logObj.text;
                            p.style.margin = "4px 0";
                            logBox.appendChild(p);
                        }
                    });
                }
                logBox.scrollTop = logBox.scrollHeight;
            });
        });

        // 🔥 撳「開局掣」派牌邏輯！
        startBtn.addEventListener('click', async () => {
            if (!currentRoom) return;

            // 先去資料庫捉晒現時房內有邊幾個玩家
            const playersRef = ref(db, `rooms/${currentRoom}/players`);
            const snapshot = await get(playersRef);
            const playersData = snapshot.val();

            if (!playersData) return;

            const playerIds = Object.keys(playersData);
            const totalPlayers = playerIds.length;

            // 廣東話狼人殺簡易派牌池（根據人數隨機分派）
            // 規則範例：如果得 2-3 人，1隻狼，其餘村民/預言家
            let rolesPool = [];
            if (totalPlayers <= 2) {
                rolesPool = ["🐺 狼人", "👁️ 預言家"];
            } else if (totalPlayers === 3) {
                rolesPool = ["🐺 狼人", "👁️ 預言家", "🧑‍🌾 村民"];
            } else {
                // 4人或以上
                rolesPool = ["🐺 狼人", "👁️ 預言家", "🧑‍🌾 村民", "🧑‍🌾 村民", "🛡️ 女巫", "🐺 狼人"];
            }

            // 漁夫洗牌法 (Fisher-Yates Shuffle) 隨機打亂牌池
            for (let i = rolesPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rolesPool[i], rolesPool[j]] = [rolesPool[j], rolesPool[i]];
            }

            // 逐個玩家更新身份入 Firebase 雲端
            playerIds.forEach((id, index) => {
                const assignedRole = rolesPool[index] || "🧑‍🌾 村民"; // 萬一爆人數就做村民
                set(ref(db, `rooms/${currentRoom}/players/${id}/role`), assignedRole);
            });

            // 發一條開局 Log 宣戰
            const logsRef = ref(db, `rooms/${currentRoom}/logs`);
            const newLogRef = push(logsRef);
            set(newLogRef, { text: `🎬 【遊戲開始】天黑請閉眼，身份牌已發出！` });
        });
    </script>
</body>
</html>
