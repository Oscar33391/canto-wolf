<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣東話狼人殺 - 女巫與天光自動結算版</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #ffffff; text-align: center; padding: 20px; transition: background 0.5s; }
        .container { max-width: 450px; background: #1e1e1e; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #2c2c2c; color: #fff; font-size: 16px; }
        button { width: 85%; padding: 12px; background: #e50914; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; margin: 5px 0; }
        
        .ready-btn { background: #ffaa00; color: #000; margin-top: 10px; }
        .ready-active { background: #28a745 !important; color: #fff !important; }
        
        .night-mode { background: #0b0c10 !important; color: #66fcf1; }
        .night-card { background: #1f2833 !important; border: 2px solid #45f3ff; }
        
        #identity-card { background: #ffcc00; color: #000; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 22px; margin: 15px auto; width: 80%; display: none; border: 3px dashed #ff0000; }
        #player-box { width: 85%; background: #2a2a2a; margin: 15px auto; padding: 10px; border-radius: 4px; text-align: left; border-left: 5px solid #e50914; }
        #log-box { width: 85%; height: 120px; background: #000; margin: 15px auto; padding: 10px; border-radius: 4px; text-align: left; overflow-y: auto; font-family: monospace; color: #00ff00; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 5px 0; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
        .skill-btn { width: auto; padding: 4px 10px; font-size: 12px; background: #0077ff; margin: 0; }
        .status-badge { font-size: 12px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        
        /* 🧙‍♀️ 女巫專屬秘密面板 */
        #witch-panel { width: 85%; background: #4b0082; margin: 10px auto; padding: 10px; border-radius: 4px; border: 2px solid #da70d6; text-align: left; display: none; }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h2>🐺 廣東話狼人殺 Phase 5 (硬核結算)</h2>
        <h3 id="phase-status">⏳ 狀態：等待玩家入房...</h3>
        
        <div id="setup-area">
            <input type="text" id="nameInput" placeholder="打你嘅大名 (e.g. 鴨寮街預言家)">
            <input type="text" id="roomInput" placeholder="入房號碼 (e.g. RM999)">
            <button id="joinBtn">進攻間房</button>
        </div>

        <div id="ready-area" style="display: none;">
            <button id="toggleReadyBtn" class="ready-btn">✋ 點擊準備就緒</button>
            <h4 id="ready-summary-text" style="color: #ffaa00; margin: 8px 0;">⌛ 等待大家準備中...</h4>
        </div>

        <div id="identity-card">
            你的身份是：<br><span id="role-text">🤔 𢱑頭中...</span>
        </div>

        <div id="witch-panel">
            <p style="margin: 0; font-weight: bold; color: #ffc0cb;">🔮 女巫秘密魔法藥水：</p>
            <p id="witch-hint" style="font-size: 14px; margin: 5px 0;">昨晚被殺的是：等緊狼人落刀...</p>
            <button id="witchSaveBtn" class="skill-btn" style="background: #28a745;">💊 用解藥救佢</button>
            <button id="witchPoisonBtn" class="skill-btn" style="background: #e50914;">🧪 用毒藥毒其他人</button>
        </div>

        <div id="host-panel" style="display: none; border: 2px dashed #28a745; padding: 10px; margin: 10px 0; border-radius: 6px;">
            <p style="margin: 0 0 5px 0; font-size: 14px; color: #28a745; font-weight: bold;">👑 房主控制面板</p>
            <button id="startGameBtn" style="background: #28a745; display: none;">🎬 全員準備就緒！點擊確認開局</button>
            <button id="dayBtn" style="background: #28a745; display: none;">☀️ 叫醒所有人（天光結算）</button>
            <button id="nightBtn" style="background: #1f2833; border: 2px solid #45f3ff; color: #45f3ff; display: none;">🌙 天黑請閉眼（入夜）</button>
        </div>

        <h3 id="player-count-title">👥 間房有邊個：</h3>
        <div id="player-box">
            <ul id="playerList"></ul>
        </div>

        <h3>📜 房內即時動態：</h3>
        <div id="log-box"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5Aoi4sTvkfSr7B5mkpovRgs3hK3EXO44",
            authDomain: "canto-wolf-db.firebaseapp.com",
            databaseURL: "https://canto-wolf-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "canto-wolf-db",
            storageBucket: "canto-wolf-db.firebasestorage.app",
            messagingSenderId: "72589991225",
            appId: "1:72589991225:web:a95b8e9b52675d465a5ce8",
            measurementId: "G-VRSPGVTZFC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myPlayerId = null; 
        let currentRoom = null;
        let myRole = "等待開局...";
        let isHost = false; 
        let amIReady = false; 

        // 女巫每局只有一瓶藥水的狀態控制
        let hasSavePotion = true;
        let hasPoisonPotion = true;

        const nameInput = document.getElementById('nameInput');
        const roomInput = document.getElementById('roomInput');
        const joinBtn = document.getElementById('joinBtn');
        const toggleReadyBtn = document.getElementById('toggleReadyBtn');
        const readySummaryText = document.getElementById('ready-summary-text');
        const startGameBtn = document.getElementById('startGameBtn');
        const dayBtn = document.getElementById('dayBtn');
        const nightBtn = document.getElementById('nightBtn');
        const hostPanel = document.getElementById('host-panel');
        const playerList = document.getElementById('playerList');
        const logBox = document.getElementById('log-box');
        const identityCard = document.getElementById('identity-card');
        const roleText = document.getElementById('role-text');
        const phaseStatus = document.getElementById('phase-status');
        const mainContainer = document.getElementById('mainContainer');
        const playerCountTitle = document.getElementById('player-count-title');
        const readyArea = document.getElementById('ready-area');
        const witchPanel = document.getElementById('witch-panel');
        const witchHint = document.getElementById('witch-hint');
        const witchSaveBtn = document.getElementById('witchSaveBtn');
        const witchPoisonBtn = document.getElementById('witchPoisonBtn');

        joinBtn.addEventListener('click', async () => {
            const username = nameInput.value.trim();
            currentRoom = roomInput.value.trim().toUpperCase();

            if (!username || !currentRoom) {
                alert('填埋個名同房號先啦師兄！');
                return;
            }

            const roomRef = ref(db, `rooms/${currentRoom}`);
            const playersRef = ref(db, `rooms/${currentRoom}/players`);
            const logsRef = ref(db, `rooms/${currentRoom}/logs`);

            const snap = await get(playersRef);
            if (!snap.exists()) {
                isHost = true;
                set(ref(db, `rooms/${currentRoom}/state`), "waiting"); 
            }

            const newPlayerRef = push(playersRef);
            myPlayerId = newPlayerRef.key; 
            set(newPlayerRef, { name: username, role: "等待開局...", ready: false });

            const newLogRef = push(logsRef);
            set(newLogRef, { text: `👤 ${username} 塞咗入房喇。` });

            joinBtn.disabled = true;
            joinBtn.innerText = "成功入房";
            document.getElementById('setup-area').style.display = "none";
            readyArea.style.display = "block"; 
            
            if (isHost) {
                hostPanel.style.display = "block";
            }

            onValue(roomRef, (snapshot) => {
                const roomData = snapshot.val();
                if (!roomData) return;

                const gameState = roomData.state || "waiting";
                const totalInRoom = roomData.players ? Object.keys(roomData.players).length : 0;

                playerCountTitle.innerText = `👥 間房有邊個 (${totalInRoom} 人)：`;

                let readyCount = 0;
                if (roomData.players) {
                    Object.values(roomData.players).forEach(p => {
                        if (p.ready === true) readyCount++;
                    });
                }

                // 1. 狀態渲染與切換
                if (gameState === "waiting") {
                    phaseStatus.innerText = `⏳ 狀態：等緊所有人準備就緒... (${readyCount} / ${totalInRoom} 已準備)`;
                    readyArea.style.display = "block"; 
                    witchPanel.style.display = "none";
                    
                    if (isHost && totalInRoom >= 2 && readyCount === totalInRoom) {
                        startGameBtn.style.display = "block";
                        readySummaryText.innerText = "✅ 全員已準備好！請房主手動點擊下方按鈕確認開局！";
                    } else {
                        startGameBtn.style.display = "none";
                        readySummaryText.innerText = `⌛ 等待大家準備中... (${readyCount} / ${totalInRoom})`;
                    }
                    if (isHost) { dayBtn.style.display = "none"; nightBtn.style.display = "none"; }

                } else if (gameState === "night") {
                    document.body.classList.add('night-mode');
                    mainContainer.classList.add('night-card');
                    phaseStatus.innerText = "🌙 【天黑請閉眼】黑夜行動中...";
                    readyArea.style.display = "none"; 
                    startGameBtn.style.display = "none";
                    
                    if (isHost) { dayBtn.style.display = "block"; nightBtn.style.display = "none"; }

                    // 🧙‍♀️ 女巫黑夜專屬顯示
                    if (myRole && myRole.includes("女巫")) {
                        witchPanel.style.display = "block";
                        const actions = roomData.night_actions || {};
                        if (actions.wolf_target) {
                            // 從 ID 查出被刀者名字
                            const victimId = actions.wolf_target;
                            const victimName = roomData.players[victimId] ? roomData.players[victimId].name : "未知玩家";
                            witchHint.innerText = `🚨 收到風！今晚被殺嘅係：[${victimName}]`;
                            witchSaveBtn.disabled = !hasSavePotion;
                        } else {
                            witchHint.innerText = `⏳ 等緊狼人落刀，藥水先可以發動...`;
                            witchSaveBtn.disabled = true;
                        }
                        witchPoisonBtn.disabled = !hasPoisonPotion;
                    } else {
                        witchPanel.style.display = "none";
                    }

                } else if (gameState === "day") {
                    document.body.classList.remove('night-mode');
                    mainContainer.classList.remove('night-card');
                    phaseStatus.innerText = "☀️ 【天光請睜眼】大家請討論！";
                    readyArea.style.display = "none";
                    startGameBtn.style.display = "none";
                    witchPanel.style.display = "none";
                    
                    if (isHost) { dayBtn.style.display = "none"; nightBtn.style.display = "block"; }
                }

                // 2. 更新玩家名單展示與技能判定
                playerList.innerHTML = '';
                if (roomData.players) {
                    if (roomData.players[myPlayerId]) {
                        myRole = roomData.players[myPlayerId].role;
                        amIReady = roomData.players[myPlayerId].ready || false;
                        
                        if (amIReady) {
                            toggleReadyBtn.innerText = "✅ 你已準備就緒 (點擊取消)";
                            toggleReadyBtn.classList.add('ready-active');
                        } else {
                            toggleReadyBtn.innerText = "✋ 點擊準備就緒";
                            toggleReadyBtn.classList.remove('ready-active');
                        }
                    }

                    Object.entries(roomData.players).forEach(([id, playerObj]) => {
                        if (playerObj && playerObj.name) {
                            const li = document.createElement('li');
                            
                            let statusHtml = "";
                            if (gameState === "waiting") {
                                statusHtml = playerObj.ready ? 
                                    `<span class="status-badge" style="background:#28a745; color:white;">已準備</span>` : 
                                    `<span class="status-badge" style="background:#555; color:#aaa;">未準備</span>`;
                            } else {
                                let displayRole = playerObj.role === "等待開局..." ? "⏳ 等待中" : "🔒 身份已隱藏";
                                statusHtml = `<span style="color:#aaa;">[${displayRole}]</span>`;
                            }

                            li.innerHTML = `<span>👤 ${playerObj.name} ${statusHtml}</span>`;

                            // 🚨 秘密黑夜技能操作（不再發公眾 Log，改寫入秘密對局區）
                            if (gameState === "night" && id !== myPlayerId) {
                                if (myRole && myRole.includes("狼人")) {
                                    const killBtn = document.createElement('button');
                                    killBtn.className = "skill-btn";
                                    killBtn.innerText = "🔪 隊冧佢";
                                    killBtn.onclick = () => {
                                        // 秘密寫入，不寫入公眾 logs 穿煲
                                        set(ref(db, `rooms/${currentRoom}/night_actions/wolf_target`), id);
                                        alert(`你已秘密投票今晚殺死 ${playerObj.name}！`);
                                    };
                                    li.appendChild(killBtn);
                                }
                                else if (myRole && myRole.includes("預言家")) {
                                    const checkBtn = document.createElement('button');
                                    checkBtn.className = "skill-btn";
                                    checkBtn.style.background = "#00abc5";
                                    checkBtn.innerText = "👁️ 查驗";
                                    checkBtn.onclick = () => alert(`🔮 查驗結果：${playerObj.name} 的真實身份是 [${playerObj.role}]！`);
                                    li.appendChild(checkBtn);
                                }
                                // 女巫毒人按鈕
                                else if (myRole && myRole.includes("女巫") && hasPoisonPotion) {
                                    const poisonTargetBtn = document.createElement('button');
                                    poisonTargetBtn.className = "skill-btn";
                                    poisonTargetBtn.style.background = "#ba55d3";
                                    poisonTargetBtn.innerText = "🧪 餵毒藥";
                                    poisonTargetBtn.onclick = () => {
                                        set(ref(db, `rooms/${currentRoom}/night_actions/witch_poison`), id);
                                        hasPoisonPotion = false;
                                        alert(`調配成功！今晚將會毒殺 ${playerObj.name}。`);
                                    };
                                    li.appendChild(poisonTargetBtn);
                                }
                            }

                            playerList.appendChild(li);

                            if (id === myPlayerId && playerObj.role !== "等待開局...") {
                                identityCard.style.display = "block";
                                roleText.innerText = myRole;
                            }
                        }
                    });
                }

                // 3. 更新日誌
                logBox.innerHTML = '';
                if (roomData.logs) {
                    Object.values(roomData.logs).forEach(logObj => {
                        if (logObj && logObj.text) {
                            const p = document.createElement('p');
                            p.innerText = logObj.text;
                            p.style.margin = "4px 0";
                            logBox.appendChild(p);
                        }
                    });
                }
                logBox.scrollTop = logBox.scrollHeight;
            });
        });

        // 女巫點擊解藥
        witchSaveBtn.addEventListener('click', async () => {
            if (!currentRoom || !hasSavePotion) return;
            set(ref(db, `rooms/${currentRoom}/night_actions/witch_save`), true);
            hasSavePotion = false;
            alert("💊 你已對今晚被刀的玩家使用了萬靈解藥！");
        });

        toggleReadyBtn.addEventListener('click', () => {
            if (!currentRoom || !myPlayerId) return;
            const nextReadyState = !amIReady;
            set(ref(db, `rooms/${currentRoom}/players/${myPlayerId}/ready`), nextReadyState);
            
            const username = nameInput.value.trim();
            const logsRef = ref(db, `rooms/${currentRoom}/logs`);
            push(logsRef).set({ text: nextReadyState ? `👍 ${username} 準備好喇！` : `✋ ${username} 取消咗準備。` });
        });

        // 🎬 房主開局（重新定義牌組：引入女巫 🧙‍♀️）
        startGameBtn.addEventListener('click', async () => {
            if (!currentRoom || !isHost) return;

            const playersRef = ref(db, `rooms/${currentRoom}/players`);
            const snap = await get(playersRef);
            if (!snap.exists()) return;

            const playersData = snap.val();
            const playerIds = Object.keys(playersData);
            const totalPlayers = playerIds.length;

            let rolesPool = [];
            // 💡 3人與4人局硬核牌組分配
            if (totalPlayers <= 2) rolesPool = ["🐺 狼人", "👁️ 預言家"];
            else if (totalPlayers === 3) rolesPool = ["🐺 狼人", "👁️ 預言家", "🧙‍♀️ 女巫"];
            else rolesPool = ["🐺 狼人", "👁️ 預言家", "🧙‍♀️ 女巫", "🧑‍🌾 村民"];

            for (let i = rolesPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rolesPool[i], rolesPool[j]] = [rolesPool[j], rolesPool[i]];
            }

            playerIds.forEach((id, index) => {
                const assignedRole = rolesPool[index] || "🧑‍🌾 村民"; 
                set(ref(db, `rooms/${currentRoom}/players/${id}/role`), assignedRole);
            });

            set(ref(db, `rooms/${currentRoom}/state`), "night");
            
            const logsRef = ref(db, `rooms/${currentRoom}/logs`);
            push(logsRef).set({ text: `🎬 房主已點擊確認！遊戲正式開始！` });
            push(logsRef).set({ text: `🌙 天黑請閉眼，請在上方黃色盲盒查看個人身份！` });
        });

        // ☀️ 房主控制切換成天光 —— 🧠 硬核自動結算中心 🧠
        dayBtn.addEventListener('click', async () => {
            if (!currentRoom || !isHost) return;

            const roomRef = ref(db, `rooms/${currentRoom}`);
            const snap = await get(roomRef);
            if (!snap.exists()) return;

            const roomData = snap.val();
            const actions = roomData.night_actions || {};
            const players = roomData.players || {};
            const logsRef = ref(db, `rooms/${currentRoom}/logs`);

            let wolfTarget = actions.wolf_target || null;
            let witchSaved = actions.witch_save || false;
            let witchPoisoned = actions.witch_poison || null;

            let deadTonight = [];

            // 1. 計算狼刀與解藥
            if (wolfTarget) {
                if (witchSaved) {
                    // 被救活了，相安無事
                } else {
                    deadTonight.push(players[wolfTarget] ? players[wolfTarget].name : "未知玩家");
                }
            }

            // 2. 計算毒藥
            if (witchPoisoned) {
                deadTonight.push(players[witchPoisoned] ? players[witchPoisoned].name : "未知玩家");
            }

            // 3. 切換至白天狀態
            set(ref(db, `rooms/${currentRoom}/state`), "day");

            // 4. 公布死亡名單
            push(logsRef).set({ text: `☀️ 【天亮了】房主叫醒了所有人。` });
            if (deadTonight.length === 0) {
                push(logsRef).set({ text: `🕊️ 尋晚係平安夜！冇人死到，大吉大利！` });
            } else {
                // 去重顯示
                let uniqueDead = [...new Set(deadTonight)];
                push(logsRef).set({ text: `💀 尋晚死咗嘅人有：[ ${uniqueDead.join(', ')} ]。全場同哀！` });
            }

            // 5. 🧠 清空這一晚的秘密行動數據，準備迎接下一晚
            remove(ref(db, `rooms/${currentRoom}/night_actions`));
        });

        // 🌙 房主控制切換回黑夜
        nightBtn.addEventListener('click', () => {
            if (!currentRoom) return;
            set(ref(db, `rooms/${currentRoom}/state`), "night");
            const logsRef = ref(db, `rooms/${currentRoom}/logs`);
            push(logsRef).set({ text: `🌙 【天黑請閉眼】黑夜再次降臨，狼人、預言家、女巫請秘密行動！` });
        });
    </script>
</body>
</html>
