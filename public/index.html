<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣東話狼人殺 v1.7.10</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #ffffff; text-align: center; padding: 20px; transition: background 0.5s; }
        .container { max-width: 450px; background: #1e1e1e; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #2c2c2c; color: #fff; font-size: 16px; }
        button { width: 85%; padding: 12px; background: #e50914; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; margin: 5px 0; }
        
        .ready-btn { background: #ffaa00; color: #000; margin-top: 10px; }
        .ready-active { background: #28a745 !important; color: #fff !important; }
        
        .night-mode { background: #0b0c10 !important; color: #66fcf1; }
        .night-card { background: #1f2833 !important; border: 2px solid #45f3ff; }
        
        #identity-card { background: #ffcc00; color: #000; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 22px; margin: 15px auto; width: 80%; display: none; border: 3px dashed #ff0000; }
        #player-box { width: 85%; background: #2a2a2a; margin: 15px auto; padding: 10px; border-radius: 4px; text-align: left; border-left: 5px solid #e50914; }
        #log-box { width: 85%; height: 120px; background: #000; margin: 15px auto; padding: 10px; border-radius: 4px; text-align: left; overflow-y: auto; font-family: monospace; color: #00ff00; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 5px 0; font-size: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .skill-btn { width: auto; padding: 4px 10px; font-size: 12px; background: #0077ff; margin: 2px; }
        .status-badge { font-size: 12px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        
        #witch-panel { width: 85%; background: #4b0082; margin: 10px auto; padding: 10px; border-radius: 4px; border: 2px solid #da70d6; text-align: left; display: none; }
        
        .config-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 14px; color: #fff; }
        .config-row input { width: 60px; padding: 5px; margin: 0; text-align: center; background: #333; border: 1px solid #555; border-radius: 4px; color: #fff; }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h2>🐺 廣東話狼人殺 v1.7.10</h2>
        <h3 id="phase-status">⏳ 狀態：等待玩家入房...</h3>
        
        <div id="setup-area">
            <input type="text" id="nameInput" placeholder="打你嘅大名 (e.g. 鴨寮街預言家)">
            <input type="text" id="roomInput" placeholder="入房號碼 (e.g. RM999)">
            <button id="joinBtn">進攻間房</button>
        </div>

        <div id="ready-area" style="display: none;">
            <button id="toggleReadyBtn" class="ready-btn">✋ 點擊準備就緒</button>
            <h4 id="ready-summary-text" style="color: #ffaa00; margin: 8px 0;">⌛ 等待大家準備中...</h4>
        </div>

        <div id="identity-card">
            你的身份是：<br><span id="role-text">🤔 𢱑頭中...</span>
        </div>

        <div id="witch-panel">
            <p style="margin: 0; font-weight: bold; color: #ffc0cb;">🔮 女巫秘密魔法藥水面板：</p>
            <p id="witch-hint" style="font-size: 14px; margin: 5px 0;">昨晚被殺的是：等緊狼人落刀...</p>
            <button id="witchSaveBtn" class="skill-btn" style="background: #28a745;">💊 用解藥救佢</button>
            <p id="witch-status-text" style="font-size: 12px; color: #da70d6; margin: 5px 0 0 0; font-weight: bold;"></p>
        </div>

        <div id="host-panel" style="display: none; border: 2px dashed #28a745; padding: 10px; margin: 10px 0; border-radius: 6px;">
            <p style="margin: 0 0 5px 0; font-size: 14px; color: #28a745; font-weight: bold;">👑 房主控制面板</p>
            
            <div id="role-config-area" style="background: #252525; padding: 8px; border-radius: 4px; margin-bottom: 10px; border: 1px solid #3c3c3c;">
                <p style="margin: 0 0 8px 0; font-size: 13px; color: #ffaa00; font-weight: bold; text-align: left;">🛠️ 自訂身份配置：</p>
                <div class="config-row"><span>🐺 狼人 人數:</span><input type="number" id="cfg-wolf" value="2" min="0"></div>
                <div class="config-row"><span>👁️ 預言家 人數:</span><input type="number" id="cfg-seer" value="1" min="0"></div>
                <div class="config-row"><span>🧙‍♀️ 女巫 人數:</span><input type="number" id="cfg-witch" value="1" min="0"></div>
                <div class="config-row"><span>🧑‍🌾 村民 人數:</span><input type="number" id="cfg-villager" value="0" min="0"></div>
            </div>

            <button id="startGameBtn" style="background: #28a745; display: none;">🎬 全員準備就緒！點擊確認開局</button>
            <button id="dayBtn" style="background: #28a745; display: none;">☀️ 叫醒所有人（天光結算）</button>
            <button id="tallyVotesBtn" style="background: #ffaa00; color: #000; display: none;">🗳️ 點票並公投處決最高票者</button>
            <button id="nightBtn" style="background: #1f2833; border: 2px solid #45f3ff; color: #45f3ff; display: none;">🌙 冇人出局直接入夜</button>
        </div>

        <h3 id="player-count-title">👥 間房有邊個：</h3>
        <div id="player-box">
            <ul id="playerList"></ul>
        </div>

        <h3>📜 房內即時動態：</h3>
        <div id="log-box"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5Aoi4sTvkfSr7B5mkpovRgs3hK3EXO44",
            authDomain: "canto-wolf-db.firebaseapp.com",
            databaseURL: "https://canto-wolf-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "canto-wolf-db",
            storageBucket: "canto-wolf-db.firebasestorage.app",
            messagingSenderId: "72589991225",
            appId: "1:72589991225:web:a95b8e9b52675d465a5ce8",
            measurementId: "G-VRSPGVTZFC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myPlayerId = null; 
        let currentRoom = null;
        let myRole = "等待開局...";
        let isHost = false; 
        let amIReady = false; 
        let hasCheckedTonight = false; 

        const nameInput = document.getElementById('nameInput');
        const roomInput = document.getElementById('roomInput');
        const joinBtn = document.getElementById('joinBtn');
        const toggleReadyBtn = document.getElementById('toggleReadyBtn');
        const readySummaryText = document.getElementById('ready-summary-text');
        const startGameBtn = document.getElementById('startGameBtn');
        const dayBtn = document.getElementById('dayBtn');
        const tallyVotesBtn = document.getElementById('tallyVotesBtn');
        const nightBtn = document.getElementById('nightBtn');
        const hostPanel = document.getElementById('host-panel');
        const roleConfigArea = document.getElementById('role-config-area');
        const playerList = document.getElementById('playerList');
        const logBox = document.getElementById('log-box');
        const identityCard = document.getElementById('identity-card');
        const roleText = document.getElementById('role-text');
        const phaseStatus = document.getElementById('phase-status');
        const mainContainer = document.getElementById('mainContainer');
        const playerCountTitle = document.getElementById('player-count-title');
        const readyArea = document.getElementById('ready-area');
        const witchPanel = document.getElementById('witch-panel');
        const witchHint = document.getElementById('witch-hint');
        const witchSaveBtn = document.getElementById('witchSaveBtn');
        const witchStatusText = document.getElementById('witch-status-text');

        joinBtn.addEventListener('click', async () => {
            const username = nameInput.value.trim();
            currentRoom = roomInput.value.trim().toUpperCase();

            if (!username || !currentRoom) {
                alert('填埋個名同房號先啦師兄！');
                return;
            }

            joinBtn.disabled = true;
            joinBtn.innerText = "連線中...";

            try {
                const roomStateRef = ref(db, `rooms/${currentRoom}/state`);
                const stateSnap = await get(roomStateRef);
                
                if (stateSnap.exists() && stateSnap.val() !== "waiting") {
                    alert("⛔ 依間房嘅遊戲已經開始咗或者結束咗，依家入唔到房！");
                    joinBtn.disabled = false;
                    joinBtn.innerText = "進攻間房";
                    return;
                }

                const playersRef = ref(db, `rooms/${currentRoom}/players`);
                const logsRef = ref(db, `rooms/${currentRoom}/logs`);
                const snap = await get(playersRef);
                
                if (!snap.exists()) {
                    isHost = true;
                    await set(roomStateRef, "waiting"); 
                }

                const newPlayerRef = push(playersRef);
                myPlayerId = newPlayerRef.key; 
                await set(newPlayerRef, { name: username, role: "等待開局...", ready: false, isDead: false });

                await set(push(logsRef), { text: `👤 ${username} 塞咗入房喇。` });

                joinBtn.innerText = "成功入房";
                document.getElementById('setup-area').style.display = "none";
                readyArea.style.display = "block"; 
                
                if (isHost) { hostPanel.style.display = "block"; }

                const roomRef = ref(db, `rooms/${currentRoom}`);
                onValue(roomRef, (snapshot) => {
                    const roomData = snapshot.val();
                    if (!roomData) return;

                    const gameState = roomData.state || "waiting";
                    const totalInRoom = roomData.players ? Object.keys(roomData.players).length : 0;
                    const amIDead = roomData.players && roomData.players[myPlayerId] ? roomData.players[myPlayerId].isDead : false;

                    playerCountTitle.innerText = `👥 間房有邊個 (${totalInRoom} 人)：`;

                    let readyCount = 0;
                    let aliveWolvesCount = 0;
                    
                    if (roomData.players) {
                        Object.values(roomData.players).forEach(p => {
                            if (p.ready === true) readyCount++;
                            if (p.isDead !== true && p.role && p.role.includes("狼人")) {
                                aliveWolvesCount++;
                            }
                        });
                    }

                    if (roomData.players && roomData.players[myPlayerId]) {
                        myRole = roomData.players[myPlayerId].role;
                        amIReady = roomData.players[myPlayerId].ready || false;
                    }

                    const votesData = roomData.votes || {};
                    const voteCounts = {}; 
                    Object.entries(votesData).forEach(([voterId, targetId]) => {
                        if (roomData.players && roomData.players[voterId]) {
                            if (!voteCounts[targetId]) voteCounts[targetId] = [];
                            voteCounts[targetId].push(roomData.players[voterId].name);
                        }
                    });

                    const nightWolfVotes = roomData.night_wolf_votes || {};
                    const wolfVoteCounts = {};
                    Object.entries(nightWolfVotes).forEach(([voterId, targetId]) => {
                        if (roomData.players && roomData.players[voterId]) {
                            if (!wolfVoteCounts[targetId]) wolfVoteCounts[targetId] = [];
                            wolfVoteCounts[targetId].push(roomData.players[voterId].name);
                        }
                    });

                    const nightWolfLocks = roomData.night_wolf_locks || {};
                    let totalLocksCount = Object.keys(nightWolfLocks).length;

                    let verifiedConsensusTargetId = null;
                    Object.entries(wolfVoteCounts).forEach(([tId, voters]) => {
                        if (voters.length === aliveWolvesCount && totalLocksCount === aliveWolvesCount && aliveWolvesCount > 0) {
                            verifiedConsensusTargetId = tId;
                        }
                    });

                    if (gameState === "waiting") {
                        phaseStatus.innerText = `⏳ 狀態：等緊所有人準備就緒... (${readyCount} / ${totalInRoom})`;
                        readyArea.style.display = "block"; 
                        witchPanel.style.display = "none";
                        if (isHost) {
                            roleConfigArea.style.display = "block"; 
                            if (totalInRoom >= 2 && readyCount === totalInRoom) {
                                startGameBtn.style.display = "block";
                                readySummaryText.innerText = "✅ 全員已準備好！請房主確認身份配置並開局！";
                            } else {
                                startGameBtn.style.display = "none";
                                readySummaryText.innerText = `⌛ 等待大家準備中... (${readyCount} / ${totalInRoom})`;
                            }
                            dayBtn.style.display = "none"; tallyVotesBtn.style.display = "none"; nightBtn.style.display = "none";
                        }

                    } else if (gameState === "night") {
                        document.body.classList.add('night-mode');
                        mainContainer.classList.add('night-card');
                        phaseStatus.innerText = "🌙 【天黑請閉眼】黑夜行動中... 狼人需要投同一人並雙重確認鎖定！";
                        readyArea.style.display = "none"; 
                        startGameBtn.style.display = "none";
                        if (isHost) { roleConfigArea.style.display = "none"; dayBtn.style.display = "block"; tallyVotesBtn.style.display = "none"; nightBtn.style.display = "none"; }

                        if (myRole && myRole.includes("女巫") && !amIDead) {
                            witchPanel.style.display = "block";
                            const myWitchData = roomData.players[myPlayerId];
                            const hasSavePotion = myWitchData.hasSavePotion !== false;

                            witchStatusText.innerText = `剩餘物資：解藥 [${hasSavePotion ? '✅ 有' : '❌ 冇'}] | 毒藥 [${myWitchData.hasPoisonPotion !== false ? '✅ 有' : '❌ 冇'}]`;

                            if (verifiedConsensusTargetId) {
                                const victimName = roomData.players[verifiedConsensusTargetId] ? roomData.players[verifiedConsensusTargetId].name : "未知玩家";
                                witchHint.innerText = `🚨 狼人已全體按鍵確認！今晚被殺嘅係：[${victimName}]`;
                                witchSaveBtn.disabled = !hasSavePotion;
                            } else {
                                witchHint.innerText = `⏳ 狼人未達成一致決議或未全體按「鎖定確認」，你睇唔到邊個被殺...`;
                                witchSaveBtn.disabled = true;
                            }
                        } else { witchPanel.style.display = "none"; }

                    } else if (gameState === "day") {
                        document.body.classList.remove('night-mode');
                        mainContainer.classList.remove('night-card');
                        phaseStatus.innerText = "☀️ 【天光請睜眼】請全場自由討論，並點擊下方按鈕投票！";
                        readyArea.style.display = "none";
                        startGameBtn.style.display = "none";
                        witchPanel.style.display = "none";
                        hasCheckedTonight = false; 
                        if (isHost) { roleConfigArea.style.display = "none"; dayBtn.style.display = "none"; tallyVotesBtn.style.display = "block"; nightBtn.style.display = "block"; }
                    
                    } else if (gameState === "ended") {
                        document.body.classList.remove('night-mode');
                        mainContainer.classList.remove('night-card');
                        phaseStatus.innerText = "🏆 遊戲已經結束！";
                        readyArea.style.display = "none";
                        startGameBtn.style.display = "none";
                        witchPanel.style.display = "none";
                    }

                    playerList.innerHTML = '';
                    if (roomData.players) {
                        if (roomData.players[myPlayerId]) {
                            toggleReadyBtn.innerText = amIReady ? "✅ 你已準備就緒" : "✋ 點擊準備就緒";
                        }

                        Object.entries(roomData.players).forEach(([id, playerObj]) => {
                            if (playerObj && playerObj.name) {
                                const li = document.createElement('li');
                                let statusHtml = "";
                                let voteHtml = "";
                                const isDead = playerObj.isDead === true;
                                
                                if (isDead) {
                                    statusHtml = `<span class="status-badge" style="background:#555; color:#e50914;">💀 已陣亡</span>`;
                                    li.style.opacity = "0.4"; 
                                    li.style.textDecoration = "line-through";
                                } else if (gameState === "waiting") {
                                    statusHtml = playerObj.ready ? `<span class="status-badge" style="background:#28a745; color:white;">已準備</span>` : `<span class="status-badge" style="background:#555; color:#aaa;">未準備</span>`;
                                } else {
                                    statusHtml = `<span style="color:#aaa;">[🔒 身份隱藏]</span>`;
                                }

                                if (gameState === "day" && !isDead) {
                                    const voters = voteCounts[id] || [];
                                    if (voters.length > 0) {
                                        voteHtml = `<span class="status-badge" style="background:#ffaa00; color:#000; margin-left:5px;">🗳️ ${voters.length} 票</span>`;
                                    }
                                }

                                if (gameState === "night" && !isDead && myRole && myRole.includes("狼人") && !amIDead) {
                                    const wVoters = wolfVoteCounts[id] || [];
                                    if (wVoters.length > 0) {
                                        voteHtml = `<span class="status-badge" style="background:#ff3333; color:#fff; margin-left:5px;">🐺 狼印: ${wVoters.length} / ${aliveWolvesCount} 票</span>`;
                                    }
                                }

                                li.innerHTML = `<span>👤 ${playerObj.name} ${statusHtml} ${voteHtml}</span>`;

                                if (gameState === "night" && id !== myPlayerId && !isDead && !amIDead) {
                                    if (myRole && myRole.includes("狼人")) {
                                        const hasLocked = nightWolfLocks[myPlayerId] === true;

                                        const killBtn = document.createElement('button');
                                        killBtn.className = "skill-btn";
                                        killBtn.style.background = hasLocked ? "#555555" : "#b30000";
                                        killBtn.innerText = "🔪 點選目標";
                                        
                                        if (hasLocked) {
                                            killBtn.style.cursor = "not-allowed";
                                            killBtn.onclick = () => alert("🔒 你已經確認鎖定，冇得反悔啦！");
                                        } else {
                                            killBtn.onclick = () => {
                                                set(ref(db, `rooms/${currentRoom}/night_wolf_votes/${myPlayerId}`), id);
                                                set(ref(db, `rooms/${currentRoom}/night_wolf_locks/${myPlayerId}`), null);
                                            };
                                        }
                                        li.appendChild(killBtn);

                                        const wVoters = wolfVoteCounts[id] || [];
                                        if (wVoters.length === aliveWolvesCount && aliveWolvesCount > 0) {
                                            const lockBtn = document.createElement('button');
                                            lockBtn.className = "skill-btn";
                                            lockBtn.style.background = hasLocked ? "#28a745" : "#ffaa00";
                                            lockBtn.style.color = hasLocked ? "#fff" : "#000";
                                            lockBtn.innerText = hasLocked ? "✅ 已鎖定目標" : "🔒 雙方同意，確認鎖定！";
                                            lockBtn.onclick = () => {
                                                if (!hasLocked) {
                                                    set(ref(db, `rooms/${currentRoom}/night_wolf_locks/${myPlayerId}`), true);
                                                }
                                            };
                                            li.appendChild(lockBtn);
                                        }
                                    }
                                    else if (myRole && myRole.includes("預言家")) {
                                        const checkBtn = document.createElement('button');
                                        checkBtn.className = "skill-btn";
                                        checkBtn.style.background = "#00abc5";
                                        checkBtn.innerText = "👁️ 查驗";
                                        checkBtn.onclick = () => {
                                            if (hasCheckedTonight) { alert("🚫 每晚只可以驗一個玩家！"); return; }
                                            hasCheckedTonight = true;
                                            alert(`🔮 查驗結果：${playerObj.name} 是 [${playerObj.role}]！`);
                                        };
                                        li.appendChild(checkBtn);
                                    }
                                    else if (myRole && myRole.includes("女巫") && roomData.players[myPlayerId].hasPoisonPotion !== false) {
                                        const poisonTargetBtn = document.createElement('button');
                                        poisonTargetBtn.className = "skill-btn";
                                        poisonTargetBtn.style.background = "#ba55d3";
                                        poisonTargetBtn.innerText = "🧪 餵毒藥";
                                        poisonTargetBtn.onclick = () => {
                                            set(ref(db, `rooms/${currentRoom}/night_actions/witch_poison`), id);
                                            set(ref(db, `rooms/${currentRoom}/players/${myPlayerId}/hasPoisonPotion`), false);
                                        };
                                        li.appendChild(poisonTargetBtn);
                                    }
                                }

                                if (gameState === "day" && id !== myPlayerId && !isDead && !amIDead) {
                                    const voteBtn = document.createElement('button');
                                    voteBtn.className = "skill-btn";
                                    voteBtn.style.background = "#ff5500";
                                    voteBtn.innerText = "🗳️ 投佢";
                                    voteBtn.onclick = () => { set(ref(db, `rooms/${currentRoom}/votes/${myPlayerId}`), id); };
                                    li.appendChild(voteBtn);
                                }

                                playerList.appendChild(li);

                                if (id === myPlayerId && playerObj.role !== "等待開局...") {
                                    identityCard.style.display = "block";
                                    roleText.innerText = amIDead ? `${myRole} (💀 已陣亡)` : myRole;
                                }
                            }
                        });
                    }

                    logBox.innerHTML = '';
                    if (roomData.logs) {
                        Object.values(roomData.logs).forEach(logObj => {
                            if (logObj && logObj.text) {
                                const p = document.createElement('p');
                                p.innerText = logObj.text;
                                logBox.appendChild(p);
                            }
                        });
                    }
                    logBox.scrollTop = logBox.scrollHeight;
                });

            } catch (error) {
                console.error("Firebase Connection Error:", error);
                alert("🚫 連接數據庫失敗，請檢查網絡或重試！(Error: " + error.message + ")");
                joinBtn.disabled = false;
                joinBtn.innerText = "進攻間房";
            }
        });

        witchSaveBtn.addEventListener('click', async () => {
            if (!currentRoom) return;
            set(ref(db, `rooms/${currentRoom}/night_actions/witch_save`), true);
            set(ref(db, `rooms/${currentRoom}/players/${myPlayerId}/hasSavePotion`), false);
            alert("💊 你已使用全場唯一嘅萬靈解藥！");
        });

        toggleReadyBtn.addEventListener('click', () => {
            if (!currentRoom || !myPlayerId) return;
            set(ref(db, `rooms/${currentRoom}/players/${myPlayerId}/ready`), !amIReady);
        });

        startGameBtn.addEventListener('click', async () => {
            if (!currentRoom || !isHost) return;
            const snap = await get(ref(db, `rooms/${currentRoom}/players`));
            if (!snap.exists()) return;

            const playersData = snap.val();
            const playerIds = Object.keys(playersData);
            const totalPlayers = playerIds.length;

            const numWolf = parseInt(document.getElementById('cfg-wolf').value) || 0;
            const numSeer = parseInt(document.getElementById('cfg-seer').value) || 0;
            const numWitch = parseInt(document.getElementById('cfg-witch').value) || 0;
            const numVillager = parseInt(document.getElementById('cfg-villager').value) || 0;

            if ((numWolf + numSeer + numWitch + numVillager) !== totalPlayers) {
                alert(`❌ 人數不符！`); return;
            }

            let rolesPool = [];
            for (let i = 0; i < numWolf; i++) rolesPool.push("🐺 狼人");
            for (let i = 0; i < numSeer; i++) rolesPool.push("👁️ 預言家");
            for (let i = 0; i < numWitch; i++) rolesPool.push("🧙‍♀️ 女巫");
            for (let i = 0; i < numVillager; i++) rolesPool.push("🧑‍🌾 村民");

            for (let i = rolesPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rolesPool[i], rolesPool[j]] = [rolesPool[j], rolesPool[i]];
            }

            playerIds.forEach((id, index) => {
                const assignedRole = rolesPool[index]; 
                const playerInitData = { name: playersData[id].name, role: assignedRole, ready: false, isDead: false };
                if (assignedRole.includes("女巫")) { playerInitData.hasSavePotion = true; playerInitData.hasPoisonPotion = true; }
                set(ref(db, `rooms/${currentRoom}/players/${id}`), playerInitData);
            });

            set(ref(db, `rooms/${currentRoom}/state`), "night");
            set(push(ref(db, `rooms/${currentRoom}/logs`)), { text: `🎬 遊戲開始！天黑請閉眼。` });
        });

        dayBtn.addEventListener('click', async () => {
            if (!currentRoom || !isHost) return;

            const roomRef = ref(db, `rooms/${currentRoom}`);
            const snap = await get(roomRef);
            if (!snap.exists()) return;

            const roomData = snap.val();
            const actions = roomData.night_actions || {};
            const players = roomData.players || {};
            const nightWolfVotes = roomData.night_wolf_votes || {};
            const nightWolfLocks = roomData.night_wolf_locks || {};

            let aliveWolvesCount = 0;
            Object.values(players).forEach(p => {
                if (p.isDead !== true && p.role && p.role.includes("狼人")) aliveWolvesCount++;
            });

            const wolfScoreSheet = {};
            Object.values(nightWolfVotes).forEach(targetId => {
                wolfScoreSheet[targetId] = (wolfScoreSheet[targetId] || 0) + 1;
            });

            let totalLocksCount = Object.keys(nightWolfLocks).length;
            let wolfTarget = null;
            Object.entries(wolfScoreSheet).forEach(([targetId, count]) => {
                if (count === aliveWolvesCount && totalLocksCount === aliveWolvesCount && aliveWolvesCount > 0) {
                    wolfTarget = targetId;
                }
            });

            let witchSaved = actions.witch_save || false;
            let witchPoisoned = actions.witch_poison || null;

            let deadTonight = [];
            let deadTonightIds = [];

            if (wolfTarget && !witchSaved) {
                deadTonight.push(players[wolfTarget]?.name || "未知");
                deadTonightIds.push(wolfTarget);
            }
            if (witchPoisoned) {
                deadTonight.push(players[witchPoisoned]?.name || "未知");
                deadTonightIds.push(witchPoisoned);
            }

            let aliveWolves = 0;
            let aliveGoodGuys = 0;
            Object.entries(players).forEach(([pId, pData]) => {
                const isNowDead = pData.isDead === true || deadTonightIds.includes(pId);
                if (!isNowDead) {
                    if (pData.role && pData.role.includes("狼人")) aliveWolves++;
                    else aliveGoodGuys++;
                }
            });

            const nightUpdates = {};
            deadTonightIds.forEach(deadId => { nightUpdates[`rooms/${currentRoom}/players/${deadId}/isDead`] = true; });

            nightUpdates[`rooms/${currentRoom}/night_actions`] = null;
            nightUpdates[`rooms/${currentRoom}/night_wolf_votes`] = null; 
            nightUpdates[`rooms/${currentRoom}/night_wolf_locks`] = null; 
            nightUpdates[`rooms/${currentRoom}/votes`] = null; 

            const logsRef = ref(db, `rooms/${currentRoom}/logs`);
            const logKey1 = push(logsRef).key;
            nightUpdates[`rooms/${currentRoom}/logs/${logKey1}`] = { text: `☀️ 【天亮了】昨晚驚心動魄...` };

            const logKey2 = push(logsRef).key;
            if (deadTonight.length === 0) {
                nightUpdates[`rooms/${currentRoom}/logs/${logKey2}`] = { text: `🕊️ 昨晚是平安夜！無人身亡！（狼人未確認/鎖定失敗/空刀或被救）` };
            } else {
                nightUpdates[`rooms/${currentRoom}/logs/${logKey2}`] = { text: `💀 昨晚陣亡的人有：[ ${[...new Set(deadTonight)].join(', ')} ]。` };
            }

            if (aliveWolves === 0) {
                nightUpdates[`rooms/${currentRoom}/state`] = "ended";
            } else if (aliveWolves >= aliveGoodGuys) {
                nightUpdates[`rooms/${currentRoom}/state`] = "ended";
            } else {
                nightUpdates[`rooms/${currentRoom}/state`] = "day";
            }

            await update(ref(db), nightUpdates);
        });

        tallyVotesBtn.addEventListener('click', async () => {
            if (!currentRoom || !isHost) return;
            const snap = await get(ref(db, `rooms/${currentRoom}`));
            if (!snap.exists()) return;

            const roomData = snap.val();
            const votes = roomData.votes || {};
            const players = roomData.players || {};

            if (Object.keys(votes).length === 0) { alert("🚫 依家全場仲未有人投票！"); return; }

            const scoreSheet = {};
            Object.values(votes).forEach(targetId => { scoreSheet[targetId] = (scoreSheet[targetId] || 0) + 1; });

            let maxVotes = 0; let highestVotedIds = [];
            Object.entries(scoreSheet).forEach(([targetId, count]) => {
                if (count > maxVotes) { maxVotes = count; highestVotedIds = [targetId]; }
                else if (count === maxVotes) { highestVotedIds.push(targetId); }
            });

            if (highestVotedIds.length > 1) { alert(`⚠️ 【同票警告】出現平票！請全場重新投票！`); return; }

            const exiledId = highestVotedIds[0];
            const exiledPlayer = players[exiledId];

            let aliveWolves = 0; let aliveGoodGuys = 0;
            Object.entries(players).forEach(([pId, pData]) => {
                if (pId === exiledId) return; 
                if (pData.isDead !== true) {
                    if (pData.role && pData.role.includes("狼人")) aliveWolves++;
                    else aliveGoodGuys++;
                }
            });

            const dayUpdates = {};
            dayUpdates[`rooms/${currentRoom}/players/${exiledId}/isDead`] = true;
            dayUpdates[`rooms/${currentRoom}/votes`] = null; 

            const newLogKey = push(ref(db, `rooms/${currentRoom}/logs`)).key;
            if (aliveWolves === 0 || aliveWolves >= aliveGoodGuys) {
                dayUpdates[`rooms/${currentRoom}/state`] = "ended";
            } else {
                dayUpdates[`rooms/${currentRoom}/state`] = "night"; 
                dayUpdates[`rooms/${currentRoom}/logs/${newLogKey}`] = { text: `🗳️ [${exiledPlayer.name}] 被放逐。真實身份為：[${exiledPlayer.role}]。天黑請閉眼... 🌙` };
            }

            await update(ref(db), dayUpdates);
        });

        nightBtn.addEventListener('click', () => {
            if (!currentRoom) return;
            const skipUpdates = {};
            skipUpdates[`rooms/${currentRoom}/state`] = "night";
            skipUpdates[`rooms/${currentRoom}/votes`] = null;
            set(push(ref(db, `rooms/${currentRoom}/logs`)), { text: `🌙 房主宣告本輪無人出局。黑夜再次降臨！` });
            update(ref(db), skipUpdates);
        });
    </script>
</body>
</html>
