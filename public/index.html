<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣東話狼人殺 - 測試版</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #ffffff; text-align: center; padding: 30px; }
        .container { max-width: 450px; background: #1e1e1e; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #2c2c2c; color: #fff; font-size: 16px; }
        button { width: 85%; padding: 12px; background: #e50914; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #ff1f29; }
        #log-box { width: 85%; height: 200px; background: #000; margin: 20px auto; padding: 10px; border-radius: 4px; text-align: left; overflow-y: auto; font-family: monospace; color: #00ff00; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🐺 廣東話狼人殺 Phase 1</h2>
        <p>測試即時連線房</p>
        
        <input type="text" id="nameInput" placeholder="打你嘅大名 (e.g. 鴨寮街預言家)">
        <input type="text" id="roomInput" placeholder="入房號碼 (e.g. RM999)">
        <button id="joinBtn">進攻間房</button>

        <h3>房內即時動態：</h3>
        <div id="log-box"></div>
    </div>

    <!-- 呢行好重要，Socket.io 會自動喺背後提供呢個檔案，唔使自己擺入去 -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const nameInput = document.getElementById('nameInput');
        const roomInput = document.getElementById('roomInput');
        const joinBtn = document.getElementById('joinBtn');
        const logBox = document.getElementById('log-box');

        // 撳掣嗰陣將名同房號傳比後端
        joinBtn.addEventListener('click', () => {
            const username = nameInput.value.trim();
            const roomCode = roomInput.value.trim();

            if (!username || !roomCode) {
                alert('唔該入埋名同房號先啦師兄！');
                return;
            }

            // 發射訊號比 Server
            socket.emit('joinRoom', { username, roomCode });
            
            // 撳完之後鎖住唔好俾佢再撳
            joinBtn.disabled = true;
            joinBtn.innerText = "連線中...";
            joinBtn.style.background = "#555";
        });

        // 聽 Server 廣播返過嚟嘅動態訊息
        socket.on('newMessage', (msg) => {
            const p = document.createElement('p');
            p.innerText = msg;
            p.style.margin = "4px 0";
            logBox.appendChild(p);
            
            // 全自動碌到最底睇最新消息
            logBox.scrollTop = logBox.scrollHeight;
        });
    </script>
</body>
</html>
